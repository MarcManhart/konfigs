---
# Ansible Inventory
#
# Lokale Ausführung: ansible-playbook -i inventory/hosts.yml site.yml --connection=local
# Remote via SSH:    ansible-playbook -i inventory/hosts.yml site.yml

all:
  children:
    workstations:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

        # Beispiel für Remote-Host via SSH:
        # remote-workstation:
        #   ansible_host: 192.168.1.100
        #   ansible_user: mauschel
        #   ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    servers:
      hosts:
        # schwerer:
        #   ansible_host: schwerer.local
        #   install_i2p: true
        #   install_gaming: true

    vms:
      hosts:
        ubuntu-vm:
          ansible_host: 192.168.122.230  # <-- Ersetze mit der tatsächlichen IP
          ansible_user: mauschel         # <-- Dein Username in der VM
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

  vars:
    # Globale Verbindungseinstellungen
    ansible_become_method: sudo
