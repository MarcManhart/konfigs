---
# Ansible Playbook für Bunte (ASUS ROG Zephyrus G16 2025)
# Entspricht dem NixOS-Profil: base + desktop + hyprland + gnome + container + gaming + i2p + mauschel + home-manager
#
# Ausführen mit: ansible-playbook -i inventory playbook.yml --ask-become-pass --limit localhost
#
# Voraussetzung: Das konfigs-Repo muss unter ~/konfigs ausgecheckt sein.
#
# ------------------------
#  Neue Software: Immer ins Playbook eintragen, dann ansible-playbook ausführen. Nie direkt installieren, sonst weicht
#  dein System vom Playbook ab.                                                                                         
#   
#  Updates sind eine andere Sache — das ist kein Ansible-Job. Ansible ist für Konfiguration (welche Pakete installiert  
#  sind, wie sie konfiguriert sind), nicht für Wartung.      
#
#  Updates machst du wie gewohnt auf der Shell:
#  sudo pacman -Syu        # System + Pakete
#  paru -Syu               # inkl. AUR
#  flatpak update          # Flatpaks
#
#  Das kannst du auch automatisieren, z.B. per Systemd-Timer oder einem separaten Update-Skript — aber das gehört
#  konzeptionell nicht ins Ansible-Playbook, weil Updates nicht idempotent sind (Ansible würde bei jedem Run ein Update
#  auslösen).
#
#  Faustregel:
#  - Was ist installiert / wie ist es konfiguriert? → Playbook
#  - Auf welchem Stand ist es? → manuell / Timer


- name: Bunte Setup
  hosts: Bunte
  become: true
  vars:
    user: mauschel
    user_home: "/home/{{ user }}"
    konfigs_dir: "{{ user_home }}/konfigs"
    dot: "{{ konfigs_dir }}/dotfiles"
    styles: "{{ konfigs_dir }}/resources/styling"
    blender_version: "5.0"
    godot_version: "4.6"

    # ══════════════════════════════════════════════════════════════
    # Pakete (pacman)
    # ══════════════════════════════════════════════════════════════
    packages:
      # Basis
      - python
      - git-lfs
      - neovim
      - curl
      - jq
      - tree
      - zip
      - 7zip
      - htop
      - direnv
      - zsh
      - starship
      - lazygit
      # System
      - firewalld
      - thermald
      - brightnessctl
      - ddcutil
      # Drucker
      - cups
      - cups-filters
      - gutenprint
      - hplip
      # Bluetooth
      - blueman
      # Virtualisierung & Container
      - libvirt
      - virt-manager
      - qemu-desktop
      - docker
      - docker-compose
      - dive
      # Nvidia
      - nvidia-open
      # Vulkan
      - vulkan-tools
      - vulkan-validation-layers
      - mesa-demos
      - libva-utils
      # Hyprland & Wayland
      - hyprland
      - hyprpaper
      - hypridle
      - hyprlock
      - waybar
      - rofi
      - wl-clipboard
      - xclip
      - grim
      - slurp
      - swappy
      - wdisplays
      - xdg-desktop-portal-hyprland
      - network-manager-applet
      - polkit-gnome
      # GNOME
      - gnome
      - gnome-shell-extensions
      - gnome-shell-extension-appindicator
      - gnome-shell-extension-dash-to-dock
      # Theming
      - sassc
      - gnome-themes-extra
      # Fonts
      - ttf-nerd-fonts-symbols
      - ttf-firacode-nerd
      - ttf-jetbrains-mono-nerd
      - ttf-hack-nerd
      - ttf-sourcecodepro-nerd
      # Browser & Internet
      - chromium
      - tor
      - torbrowser-launcher
      - syncthing
      # Büro & Kommunikation
      - thunderbird
      - libreoffice-fresh
      - discord
      - copyq
      - terminator
      # Grafik & Medien
      - blender
      - inkscape
      - krita
      - scribus
      - obs-studio
      - vlc
      - mplayer
      - nvtop
      - conky
      - cava
      # Gaming
      - steam
      - mangohud
      - lib32-mangohud
      - gamemode
      - lib32-gamemode
      - gamescope
      - goverlay
      - wine-staging
      - winetricks
      - mupen64plus
      - retroarch
      - retroarch-assets-xmb
      - antimicrox
      - v4l2loopback-dkms
      # Dev
      - go
      - pnpm
      - dotnet-sdk
      - kitty
      # Hardware
      - solaar
      - libratbag
      - android-tools
      - parted
      # Security
      - clamav
      - veracrypt
      - i2pd
      # Sonstiges
      - flatpak

    # ══════════════════════════════════════════════════════════════
    # AUR-Pakete (paru)
    # ══════════════════════════════════════════════════════════════
    aur_packages:
      - visual-studio-code-bin
      - 1password
      - asusctl
      - supergfxctl
      - rog-control-center
      - spotify-player
      - lazydocker
      - pureref
      - bun-bin
      - networkmanager-dmenu-git
      - gnome-shell-extension-blur-my-shell
      - gtk-engine-murrine
      - ttf-ms-fonts
      - gnome-shell-extension-gsconnect
      - megasync

    # ══════════════════════════════════════════════════════════════
    # Flatpak-Apps
    # ══════════════════════════════════════════════════════════════
    flatpak_apps:
      - com.brave.Browser
      - com.visualstudio.code
      - md.obsidian.Obsidian
      - org.onlyoffice.desktopeditors
      - com.spotify.Client
      - org.localsend.localsend_app
      - net.lutris.Lutris
      - com.usebottles.bottles
      - com.usebruno.Bruno
      - com.github.tchx84.Flatseal
      - net.davidotek.pupgui2          # ProtonUp-Qt
      - org.libretro.RetroArch
      - net.pcsx2.PCSX2
      - com.discordapp.Discord
      - org.libreoffice.LibreOffice
      - com.github.ADBeveridge.Raider  # Tor Browser
      - org.godotengine.GodotSharp

    # ══════════════════════════════════════════════════════════════
    # Dotfiles Symlinks
    # ══════════════════════════════════════════════════════════════
    dotfile_links:
      - { src: ".config/terminator/config",                dest: ".config/terminator/config" }
      - { src: ".vimrc",                                   dest: ".vimrc" }
      - { src: ".zshrc",                                   dest: ".zshrc" }
      - { src: ".mplayer/config",                          dest: ".mplayer/config" }
      - { src: ".config/nvim/init.lua",                    dest: ".config/nvim/init.lua" }
      - { src: ".config/hypr/hyprland.conf",               dest: ".config/hypr/hyprland.conf" }
      - { src: ".config/hypr/hyprpaper.conf",              dest: ".config/hypr/hyprpaper.conf" }
      - { src: ".config/waybar/power_menu.xml",            dest: ".config/waybar/power_menu.xml" }
      - { src: ".config/waybar/config.jsonc",              dest: ".config/waybar/config.jsonc" }
      - { src: ".config/waybar/style.css",                 dest: ".config/waybar/style.css" }
      - { src: ".config/starship.toml",                    dest: ".config/starship.toml" }
      - { src: ".config/conky/conky.conf",                 dest: ".config/conky/conky.conf" }
      - { src: ".config/copyq/copyq.conf",                 dest: ".config/copyq/copyq.conf" }
      - { src: ".config/copyq/copyq-commands.ini",         dest: ".config/copyq/copyq-commands.ini" }
      - { src: ".config/copyq/copyq_tabs.ini",             dest: ".config/copyq/copyq_tabs.ini" }
      - { src: ".claude/settings.json",                    dest: ".claude/settings.json" }
      - { src: ".config/kritarc",                          dest: ".config/kritarc" }
      - { src: ".config/godot/editor_settings-{{ godot_version }}.tres", dest: ".config/godot/editor_settings-{{ godot_version }}.tres" }

    blender_dotfile_links:
      - { src: ".config/blender/{{ blender_version }}/config", dest: ".config/blender/{{ blender_version }}/config" }

    styling_links:
      - src: "Themes/Gruvbox-Dark-BL-LB/Gruvbox-Dark"
        dest: ".themes/Gruvbox-Dark"
      - src: "Themes/Gruvbox-Dark-BL-LB/Gruvbox-Dark/gtk-4.0/assets"
        dest: ".config/gtk-4.0/assets"
      - src: "Themes/Gruvbox-Dark-BL-LB/Gruvbox-Dark/gtk-4.0/gtk.css"
        dest: ".config/gtk-4.0/gtk.css"
      - src: "Themes/Gruvbox-Dark-BL-LB/Gruvbox-Dark/gtk-4.0/gtk-dark.css"
        dest: ".config/gtk-4.0/gtk-dark.css"

    blender_extra_links:
      - src: "{{ styles }}/Themes/Blender/theme-gruvbox-dark-v1.5.0/Gruvbox_Dark.xml"
        dest: ".config/blender/{{ blender_version }}/scripts/presets/interface_theme/Gruvbox_Dark.xml"
      - src: "{{ konfigs_dir }}/resources/blender_extensions/quick_mesh_rename.py"
        dest: ".config/blender/{{ blender_version }}/scripts/addons/quick_mesh_rename.py"

  tasks:
    # ══════════════════════════════════════════════════════════════
    # Voraussetzungen
    # ══════════════════════════════════════════════════════════════
    - name: Timezone auf Europe/Berlin setzen
      timezone:
        name: Europe/Berlin

    # ══════════════════════════════════════════════════════════════
    # Pakete installieren
    # ══════════════════════════════════════════════════════════════
    - name: Pakete installieren
      pacman:
        name: "{{ packages }}"
        state: present

    # ══════════════════════════════════════════════════════════════
    # AUR-Pakete installieren
    # ══════════════════════════════════════════════════════════════
    - name: 1Password GPG-Key importieren
      become: true
      become_user: "{{ user }}"
      shell: curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --import
      args:
        executable: /bin/bash
      changed_when: false

    - name: Temporäre NOPASSWD-Regel für paru anlegen
      copy:
        dest: /etc/sudoers.d/99-paru-temp
        content: "{{ user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: code (OSS) entfernen falls installiert (Konflikt mit visual-studio-code-bin)
      pacman:
        name: code
        state: absent
      ignore_errors: true

    - name: AUR-Pakete installieren (via paru)
      become: true
      become_user: "{{ user }}"
      command: "paru -S --noconfirm --needed {{ aur_packages | join(' ') }}"
      changed_when: false

    - name: Temporäre NOPASSWD-Regel entfernen
      file:
        path: /etc/sudoers.d/99-paru-temp
        state: absent

    # ══════════════════════════════════════════════════════════════
    # Flatpak
    # ══════════════════════════════════════════════════════════════
    - name: Flathub Remote hinzufügen
      community.general.flatpak_remote:
        name: flathub
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
        state: present

    - name: Flatpak-Apps installieren
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps }}"

    # ══════════════════════════════════════════════════════════════
    # Benutzer & Shell
    # ══════════════════════════════════════════════════════════════
    - name: Zsh als Standard-Shell setzen
      user:
        name: "{{ user }}"
        shell: /usr/bin/zsh

    - name: User-Gruppen setzen
      user:
        name: "{{ user }}"
        groups:
          - wheel
          - docker
          - video
          - audio
          - libvirt
        append: true

    - name: Oh-My-Zsh installieren
      become: true
      become_user: "{{ user }}"
      shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      args:
        creates: "{{ user_home }}/.oh-my-zsh"

    # ══════════════════════════════════════════════════════════════
    # Node.js via nvm + AI CLI Tools
    # ══════════════════════════════════════════════════════════════
    - name: nvm installieren
      become: true
      become_user: "{{ user }}"
      shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/master/install.sh | bash
      args:
        creates: "{{ user_home }}/.nvm/nvm.sh"

    - name: Node.js LTS installieren (via nvm)
      become: true
      become_user: "{{ user }}"
      shell: |
        export NVM_DIR="{{ user_home }}/.nvm"
        . "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm alias default lts/*
      args:
        executable: /bin/bash

    - name: Claude Code installieren (npm via nvm)
      become: true
      become_user: "{{ user }}"
      shell: |
        export NVM_DIR="{{ user_home }}/.nvm"
        . "$NVM_DIR/nvm.sh"
        npm install -g @anthropic-ai/claude-code
      args:
        executable: /bin/bash

    - name: OpenAI Codex CLI installieren (npm via nvm)
      become: true
      become_user: "{{ user }}"
      shell: |
        export NVM_DIR="{{ user_home }}/.nvm"
        . "$NVM_DIR/nvm.sh"
        npm install -g @openai/codex
      args:
        executable: /bin/bash

    # ══════════════════════════════════════════════════════════════
    # SSH-Härtung
    # ══════════════════════════════════════════════════════════════
    - name: SSH PasswordAuthentication deaktivieren
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: restart-sshd

    # ══════════════════════════════════════════════════════════════
    # Dotfiles Symlinks
    # ══════════════════════════════════════════════════════════════
    - name: Dotfile-Verzeichnisse anlegen
      become: true
      become_user: "{{ user }}"
      file:
        path: "{{ user_home }}/{{ item.dest | dirname }}"
        state: directory
      loop: "{{ dotfile_links + blender_dotfile_links + styling_links + blender_extra_links }}"

    - name: Dotfiles symlinken
      become: true
      become_user: "{{ user }}"
      file:
        src: "{{ dot }}/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ dotfile_links }}"

    - name: Blender-Dotfiles symlinken
      become: true
      become_user: "{{ user }}"
      file:
        src: "{{ dot }}/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ blender_dotfile_links }}"

    - name: Styling/Theme-Dateien symlinken
      become: true
      become_user: "{{ user }}"
      file:
        src: "{{ styles }}/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ styling_links }}"

    - name: Blender Theme + Addon symlinken
      become: true
      become_user: "{{ user }}"
      file:
        src: "{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ blender_extra_links }}"

    # ══════════════════════════════════════════════════════════════
    # Cursor-Theme
    # ══════════════════════════════════════════════════════════════
    - name: Cursor-Theme Verzeichnis anlegen
      become: true
      become_user: "{{ user }}"
      file:
        path: "{{ user_home }}/.icons/default"
        state: directory

    - name: Adwaita Cursor-Theme setzen
      become: true
      become_user: "{{ user }}"
      copy:
        dest: "{{ user_home }}/.icons/default/index.theme"
        content: |
          [Icon Theme]
          Inherits=Adwaita
        force: true

    # ══════════════════════════════════════════════════════════════
    # GNOME dconf Settings
    # ══════════════════════════════════════════════════════════════
    - name: GNOME Interface-Einstellungen setzen
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/desktop/interface/gtk-theme",            value: "'Gruvbox-Dark'" }
        - { key: "/org/gnome/desktop/interface/cursor-theme",         value: "'Adwaita'" }
        - { key: "/org/gnome/desktop/interface/cursor-size",          value: "24" }
        - { key: "/org/gnome/desktop/interface/text-scaling-factor",  value: "1.0" }
        - { key: "/org/gnome/desktop/interface/enable-hot-corners",   value: "true" }

    - name: GNOME Shell Extensions aktivieren
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "/org/gnome/shell/enabled-extensions"
        value: "['user-theme@gnome-shell-extensions.gcampax.github.com', 'dash-to-dock@micxgx.gmail.com', 'appindicatorsupport@rgcjonas.gmail.com', 'mock-tray@kramo.page', 'gsconnect@andyholmes.github.io']"

    - name: GNOME Shell User-Theme setzen
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "/org/gnome/shell/extensions/user-theme/name"
        value: "'Gruvbox-Dark'"

    - name: GNOME Favorite Apps setzen
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "/org/gnome/shell/favorite-apps"
        value: "['com.brave.Browser.desktop', 'thunderbird.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Settings.desktop', 'org.gnome.tweaks.desktop', 'md.obsidian.Obsidian.desktop', 'com.spotify.Client.desktop', 'com.discordapp.Discord.desktop', 'pureref.desktop', 'org.godotengine.GodotSharp.desktop', 'virt-manager.desktop', 'blender_blender.desktop', 'terminator.desktop', 'com.usebruno.Bruno.desktop', 'com.visualstudio.code.desktop', '1password.desktop']"

    - name: GNOME Fenster-Buttons
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/desktop/wm/preferences/button-layout",                  value: "'appmenu:minimize,maximize,close'" }
        - { key: "/org/gnome/desktop/wm/preferences/action-double-click-titlebar",   value: "'toggle-maximize'" }
        - { key: "/org/gnome/desktop/wm/preferences/action-middle-click-titlebar",   value: "'minimize'" }
        - { key: "/org/gnome/desktop/wm/preferences/mouse-button-modifier",          value: "'<Super>'" }
        - { key: "/org/gnome/desktop/wm/preferences/resize-with-right-button",       value: "true" }

    - name: GNOME Keybindings (Alt+Tab Fensterwechsel)
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/desktop/wm/keybindings/switch-applications",          value: "@as []" }
        - { key: "/org/gnome/desktop/wm/keybindings/switch-applications-backward", value: "@as []" }
        - { key: "/org/gnome/desktop/wm/keybindings/switch-windows",               value: "['<Alt>Tab', '<Super>Tab']" }
        - { key: "/org/gnome/desktop/wm/keybindings/switch-windows-backward",      value: "['<Shift><Alt>Tab', '<Shift><Super>Tab']" }

    - name: GNOME Shell Keybindings
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/shell/keybindings/show-screenshot-ui",   value: "['<Super><Shift>s']" }
        - { key: "/org/gnome/shell/keybindings/toggle-message-tray",  value: "['<Super>m']" }

    - name: GNOME Custom Keybinding (Super+V für CopyQ)
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings",                          value: "['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/']" }
        - { key: "/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/binding",          value: "'<Super>v'" }
        - { key: "/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/command",          value: "'env QT_QPA_PLATFORM=xcb GDK_BACKEND=x11 copyq show'" }
        - { key: "/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/name",             value: "'CopyQ - Clipboard Manager'" }

    - name: GNOME Wallpaper setzen
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/desktop/background/picture-uri",        value: "'file://{{ styles }}/Wallpapers/stairs.png'" }
        - { key: "/org/gnome/desktop/background/picture-uri-dark",   value: "'file://{{ styles }}/Wallpapers/stairs.png'" }
        - { key: "/org/gnome/desktop/background/picture-options",    value: "'zoom'" }

    - name: GNOME Mutter Einstellungen
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "/org/gnome/mutter/experimental-features"
        value: "['scale-monitor-framebuffer']"

    - name: Dash-to-Dock Konfiguration
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/shell/extensions/dash-to-dock/transparency-mode",       value: "'FIXED'" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/custom-background-color", value: "true" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/background-color",        value: "'#1d2021'" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/background-opacity",      value: "1.0" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/dock-fixed",              value: "false" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/autohide",                value: "true" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/autohide-in-fullscreen",  value: "true" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/intellihide",             value: "false" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/hide-delay",              value: "0.2" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/show-delay",              value: "0.1" }
        - { key: "/org/gnome/shell/extensions/dash-to-dock/pressure-threshold",      value: "100.0" }

    - name: GNOME Default-Anwendungen setzen (gsettings)
      become: true
      become_user: "{{ user }}"
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "/org/gnome/system/default-applications/web",      value: "'com.brave.Browser.desktop'" }
        - { key: "/org/gnome/system/default-applications/mail",     value: "'thunderbird.desktop'" }
        - { key: "/org/gnome/system/default-applications/calendar", value: "'thunderbird.desktop'" }

    - name: GNOME Default-Anwendungen setzen (mimeapps.list)
      become: true
      become_user: "{{ user }}"
      community.general.ini_file:
        path: "{{ user_home }}/.config/mimeapps.list"
        section: "Default Applications"
        option: "{{ item.mime }}"
        value: "{{ item.app }}"
        no_extra_spaces: true
        create: true
      loop:
        # Browser
        - { mime: "x-scheme-handler/http",   app: "com.brave.Browser.desktop" }
        - { mime: "x-scheme-handler/https",  app: "com.brave.Browser.desktop" }
        - { mime: "text/html",               app: "com.brave.Browser.desktop" }
        - { mime: "application/xhtml+xml",   app: "com.brave.Browser.desktop" }
        # E-Mail & Kalender (Thunderbird)
        - { mime: "x-scheme-handler/mailto", app: "thunderbird.desktop" }
        - { mime: "message/rfc822",          app: "thunderbird.desktop" }
        - { mime: "text/calendar",           app: "thunderbird.desktop" }
        - { mime: "x-scheme-handler/webcal", app: "thunderbird.desktop" }
        # Musik (VLC)
        - { mime: "audio/mpeg",              app: "vlc.desktop" }
        - { mime: "audio/ogg",               app: "vlc.desktop" }
        - { mime: "audio/flac",              app: "vlc.desktop" }
        - { mime: "audio/wav",               app: "vlc.desktop" }
        - { mime: "audio/mp4",               app: "vlc.desktop" }
        - { mime: "audio/aac",               app: "vlc.desktop" }
        - { mime: "audio/x-m4a",             app: "vlc.desktop" }
        # Video (VLC)
        - { mime: "video/mp4",               app: "vlc.desktop" }
        - { mime: "video/x-matroska",        app: "vlc.desktop" }
        - { mime: "video/avi",               app: "vlc.desktop" }
        - { mime: "video/mpeg",              app: "vlc.desktop" }
        - { mime: "video/quicktime",         app: "vlc.desktop" }
        - { mime: "video/webm",              app: "vlc.desktop" }
        - { mime: "video/x-msvideo",         app: "vlc.desktop" }

    # ══════════════════════════════════════════════════════════════
    # Systemd User-Services
    # ══════════════════════════════════════════════════════════════
    - name: Systemd User-Service-Verzeichnis anlegen
      become: true
      become_user: "{{ user }}"
      file:
        path: "{{ user_home }}/.config/systemd/user"
        state: directory

    - name: CopyQ Autostart-Service erstellen
      become: true
      become_user: "{{ user }}"
      copy:
        dest: "{{ user_home }}/.config/systemd/user/copyq.service"
        content: |
          [Unit]
          Description=CopyQ clipboard manager
          After=graphical-session.target
          PartOf=graphical-session.target

          [Service]
          ExecStartPre=/usr/bin/sleep 3
          ExecStart=/usr/bin/env QT_QPA_PLATFORM=xcb GDK_BACKEND=x11 copyq
          Restart=on-failure
          RestartSec=3
          Environment=QT_QPA_PLATFORM=xcb
          Environment=GDK_BACKEND=x11

          [Install]
          WantedBy=graphical-session.target

    - name: MEGAsync Autostart-Service erstellen
      become: true
      become_user: "{{ user }}"
      copy:
        dest: "{{ user_home }}/.config/systemd/user/megasync.service"
        content: |
          [Unit]
          Description=MEGAsync automatic sync client
          After=graphical-session-pre.target
          PartOf=graphical-session.target

          [Service]
          ExecStart=/usr/bin/megasync
          Restart=on-failure
          RestartSec=3

          [Install]
          WantedBy=graphical-session.target

    - name: User-Services aktivieren
      become: true
      become_user: "{{ user }}"
      systemd:
        name: "{{ item }}"
        enabled: true
        scope: user
        daemon_reload: true
      loop:
        - copyq
        - megasync

    # ══════════════════════════════════════════════════════════════
    # PipeWire Low-Latency
    # ══════════════════════════════════════════════════════════════
    - name: PipeWire Low-Latency Config erstellen
      copy:
        dest: /etc/pipewire/pipewire.conf.d/92-low-latency.conf
        content: |
          context.properties = {
              default.clock.rate          = 48000
              default.clock.quantum       = 512
              default.clock.min-quantum   = 512
              default.clock.max-quantum   = 512
          }

    # ══════════════════════════════════════════════════════════════
    # Services aktivieren
    # ══════════════════════════════════════════════════════════════
    - name: NetworkManager aktivieren
      systemd:
        name: NetworkManager
        enabled: true
        state: started

    - name: SSH aktivieren
      systemd:
        name: sshd
        enabled: true
        state: started

    - name: Firewall aktivieren
      systemd:
        name: firewalld
        enabled: true
        state: started

    - name: GDM aktivieren
      systemd:
        name: gdm
        enabled: true

    - name: Docker aktivieren
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Docker Auto-Prune Timer erstellen
      copy:
        dest: /etc/systemd/system/docker-prune.timer
        content: |
          [Unit]
          Description=Weekly Docker System Prune

          [Timer]
          OnCalendar=weekly
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Docker Auto-Prune Service erstellen
      copy:
        dest: /etc/systemd/system/docker-prune.service
        content: |
          [Unit]
          Description=Docker System Prune
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/docker system prune --all --force

    - name: Docker Auto-Prune Timer aktivieren
      systemd:
        name: docker-prune.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: CUPS aktivieren
      systemd:
        name: cups
        enabled: true
        state: started

    - name: Avahi aktivieren
      systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Bluetooth aktivieren
      systemd:
        name: bluetooth
        enabled: true
        state: started

    - name: Libvirtd aktivieren
      systemd:
        name: libvirtd
        enabled: true
        state: started

    - name: I2P aktivieren
      systemd:
        name: i2pd
        enabled: true
        state: started

    - name: Thermald aktivieren
      systemd:
        name: thermald
        enabled: true
        state: started
      ignore_errors: true

    - name: ClamAV Virendefinitionen aktualisieren
      command: freshclam
      changed_when: false
      ignore_errors: true

    - name: ClamAV aktivieren
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - clamav-daemon
        - clamav-freshclam

    - name: Syncthing User-Service aktivieren
      become: true
      become_user: "{{ user }}"
      systemd:
        name: syncthing
        enabled: true
        scope: user

    - name: asusctl Services aktivieren
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - asusd
        - supergfxd
      ignore_errors: true

    # ══════════════════════════════════════════════════════════════
    # Firewall-Ports
    # ══════════════════════════════════════════════════════════════
    - name: Firewall-Ports öffnen
      firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
      loop:
        - 1716-1764/tcp   # GSConnect
        - 1716-1764/udp
        - 27015-27030/tcp # Steam
        - 27000-27100/udp
        - 27036-27037/tcp
        - 4380/udp
        - 57621/tcp       # Spotify
        - 24727/tcp       # AusweisApp
        - 24727/udp
        - 53317/tcp       # LocalSend
        - 53317/udp
        - 5353/udp        # mDNS
      notify: reload-firewalld

    # ══════════════════════════════════════════════════════════════
    # Gaming-Tweaks
    # ══════════════════════════════════════════════════════════════
    - name: Controller udev-Regeln erstellen
      copy:
        dest: /etc/udev/rules.d/99-gaming-controllers.rules
        content: |
          # Nintendo Switch Pro Controller
          KERNEL=="hidraw*", ATTRS{idVendor}=="057e", ATTRS{idProduct}=="2009", MODE="0666"
          # PlayStation Controller
          KERNEL=="hidraw*", ATTRS{idVendor}=="054c", MODE="0666"
          # 8BitDo Controller
          KERNEL=="hidraw*", ATTRS{idVendor}=="2dc8", MODE="0666"
          # Steam Controller
          KERNEL=="hidraw*", ATTRS{idVendor}=="28de", MODE="0666"
      notify: reload-udev

    - name: memlock-Limits für Gaming erhöhen
      copy:
        dest: /etc/security/limits.d/99-gaming.conf
        content: |
          @users soft memlock unlimited
          @users hard memlock unlimited

    # ══════════════════════════════════════════════════════════════
    # ASUS ROG Zephyrus G16 (GU605C) Fixes
    # ══════════════════════════════════════════════════════════════
    - name: Limine Drop-in für Display-Backlight erstellen (GU605C)
      copy:
        dest: /etc/limine-entry-tool.d/asus-gu605c-backlight.conf
        content: |
          KERNEL_CMDLINE[default]+="i915.enable_dpcd_backlight=3 nvidia.NVreg_EnableBacklighthandler=0 nvidia.NVreg_RegistryDwords=EnableBrightnessControl=0"
      notify: limine-update

    - name: HandleLidSwitch auf suspend setzen
      lineinfile:
        path: /etc/systemd/logind.conf
        regexp: "^#?HandleLidSwitch="
        line: "HandleLidSwitch=suspend"
      notify: restart-logind

    - name: HandleLidSwitchDocked auf suspend setzen
      lineinfile:
        path: /etc/systemd/logind.conf
        regexp: "^#?HandleLidSwitchDocked="
        line: "HandleLidSwitchDocked=suspend"
      notify: restart-logind

  # ══════════════════════════════════════════════════════════════
  # Handlers
  # ══════════════════════════════════════════════════════════════
  handlers:
    - name: restart-sshd
      systemd:
        name: sshd
        state: restarted

    - name: reload-firewalld
      command: firewall-cmd --reload

    - name: reload-udev
      command: udevadm control --reload-rules && udevadm trigger

    - name: limine-update
      command: limine-update

    - name: restart-logind
      systemd:
        name: systemd-logind
        state: restarted
