---
# Handlers für hardware_fixes Rolle

- name: Reload NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    state: reloaded

- name: Reload udev rules
  ansible.builtin.command: udevadm control --reload-rules && udevadm trigger
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Update initramfs
  ansible.builtin.command: "{{ initramfs_update_cmd }}"
  changed_when: true

- name: Update GRUB
  ansible.builtin.command: "{{ grub_update_cmd }}"
  changed_when: true
